name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: input
    id: version
    attributes:
      label: duoduo version
      placeholder: "e.g. 0.2.2  (run: npx @openduo/duoduo --version)"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: How did you install?
      options:
        - npx @openduo/duoduo
        - npm install -g @openduo/duoduo
        - Docker container
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npx @openduo/duoduo`
        2. Type "..."
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
